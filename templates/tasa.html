{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-header bg-primary text-white">Configurar tasa del día</div>
      <div class="card-body">
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Tasa Bs/$</label>
            <input type="number" step="0.01" class="form-control" name="tasa" required value="{{ tasa or '' }}">
          </div>
          <button type="submit" class="btn btn-success">Guardar tasa</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
