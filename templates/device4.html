{% extends 'base.html' %}
{% block content %}
<h1 class="mb-4">Vendedor - Preventa</h1>
<div class="row">
  <div class="col-lg-6">
    <div class="card mb-4">
      <div class="card-header">Buscar producto</div>
      <div class="card-body">
        <input class="form-control" name="q" placeholder="Nombre, marca o modelo"
          hx-get="{{ url_for('search_products') }}"
          hx-trigger="keyup changed delay:400ms"
          hx-target="#product-results"
          hx-swap="innerHTML">
        <div id="product-results" class="mt-3">
          <div class="alert alert-secondary">Escribe para buscar stock disponible.</div>
        </div>
      </div>
    </div>
    <div class="card mb-4">
      <div class="card-header">Registrar cliente rápido</div>
      <div class="card-body">
        <form method="post" action="{{ url_for('add_client') }}">
          <input type="hidden" name="next_page" value="device4">
          <div class="mb-3">
            <label class="form-label">Cédula</label>
            <input type="text" class="form-control" name="cedula" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" name="address" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" name="phone">
          </div>
          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" class="form-control" name="email">
          </div>
          <button type="submit" class="btn btn-success">Guardar cliente</button>
        </form>
      </div>
    </div>
  </div>
  <div class="col-lg-6">
    <div class="card mb-4">
      <div class="card-header">Enviar preventa a caja</div>
      <div class="card-body">
        <form method="post" action="{{ url_for('send_presale') }}">
          <div class="mb-3">
            <label class="form-label">Cédula del cliente</label>
            <input type="text" class="form-control" name="cedula" id="cedula" required
              hx-get="{{ url_for('lookup_client') }}"
              hx-trigger="keyup changed delay:400ms"
              hx-target="#client-result"
              hx-swap="innerHTML">
          </div>
          <div id="client-result">
            <div class="alert alert-light">Busca la cédula para verificar al cliente junto al producto.</div>
          </div>
          <div class="mb-3">
            <label class="form-label">Producto ID</label>
            <input type="number" class="form-control" name="product_id" required placeholder="Selecciona un producto">
          </div>
          <div class="mb-3">
            <label class="form-label">Cantidad</label>
            <input type="number" class="form-control" name="quantity" value="1" min="1" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Empleado</label>
            <select class="form-select" name="employee" required>
              <option value="">Seleccionar empleado</option>
              {% for emp in employees %}
                {% if emp.active %}
                  <option value="{{ emp.name }}">{{ emp.name }}</option>
                {% endif %}
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Origen</label>
            <input type="text" class="form-control" name="device_source" value="Vendedor" readonly>
          </div>
          <button type="submit" class="btn btn-primary">Enviar a Caja</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
